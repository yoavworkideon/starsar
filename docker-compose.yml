version: "3.9"

# Dev setup — Ollama runs locally, only DB in Docker

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER:     stardar
      POSTGRES_PASSWORD: stardar
      POSTGRES_DB:       stardar
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stardar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
